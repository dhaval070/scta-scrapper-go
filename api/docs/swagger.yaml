host: localhost:8000
info:
  contact:
    email: support@example.com
    name: API Support
  description: API for managing hockey rink schedules, surfaces, locations, and events
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Surface API
  version: "1.0"
paths:
  /events:
    get:
      consumes:
      - application/json
      description: Returns paginated list of events with optional filters for site,
        surface, date range, and claim status. Includes surface status.
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: string
      - description: 'Items per page (default: 10, max: 100)'
        in: query
        name: perPage
        type: string
      - description: Filter by site name
        in: query
        name: site
        type: string
      - description: Filter by surface ID
        in: query
        name: surface_id
        type: string
      - description: Filter by start date (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: Filter by end date (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      - description: Export as CSV when present (any non-empty value)
        in: query
        name: export
        type: string
      - description: Filter by claim status (success or error)
        in: query
        name: claim_status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.EventsResult'
        "400":
          description: Invalid claim_status value
          schema:
            additionalProperties: true
            type: object
      security:
      - CookieAuth: []
      summary: Get paginated events
      tags:
      - Events
  /events/{id}:
    put:
      consumes:
      - application/json
      description: Updates the surface_id (and location_id) for a single event or
        all future events at the same location
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      - description: Event update parameters
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/main.UpdateEventInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Event or Surface not found
          schema:
            additionalProperties: true
            type: object
      security:
      - CookieAuth: []
      summary: Update event surface assignment
      tags:
      - Events
  /gamesheet-seasons:
    get:
      consumes:
      - application/json
      description: Fetches seasons from the Gamesheet API or a CSV file, and filters
        out inactive or expired seasons
      parameters:
      - description: 'Source of seasons: api (default) or csv'
        in: query
        name: source
        type: string
      - description: Exclude seasons already stored in the local gamesheet_seasons
          table
        in: query
        name: exclude_existing
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.Season'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - CookieAuth: []
      summary: Get active gamesheet seasons
      tags:
      - Gamesheet
  /gamesheet-seasons/import:
    post:
      consumes:
      - application/json
      description: Accepts an array of Season objects and inserts them into gamesheet_seasons
        and sites_config tables within a single transaction. Skips records that already
        exist.
      parameters:
      - description: Array of seasons to import
        in: body
        name: body
        required: true
        schema:
          items:
            $ref: '#/definitions/main.Season'
          type: array
      produces:
      - application/json
      responses:
        "201":
          description: Number of seasons imported
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - CookieAuth: []
      summary: Import gamesheet seasons
      tags:
      - Gamesheet
  /kmaster-venues:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of all venues from the kmaster venue list.
        Use export=json to download all records as a JSON file (limited fields + LiveBarn
        surfaces). Use export=csv to download all records as a CSV file (all fields).
        No pagination for exports.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10, max 100)
        in: query
        name: perPage
        type: integer
      - description: Filter by country
        in: query
        name: country
        type: string
      - description: Filter by province/state
        in: query
        name: state
        type: string
      - description: Filter by venue name (partial match)
        in: query
        name: name
        type: string
      - description: Filter by livebarn venue match status
        in: query
        name: livebarn
        type: boolean
      - description: 'Export format: ''json'' for JSON file download (limited fields
          + LiveBarn surfaces), ''csv'' for CSV file download (all fields). No pagination
          for exports.'
        in: query
        name: export
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Downloaded venue list as kmaster-venues-{timestamp}.csv
          schema:
            type: file
        "500":
          description: Internal server error
          schema:
            type: object
      security:
      - CookieAuth: []
      summary: List kmaster venues
      tags:
      - KmasterVenue
    post:
      consumes:
      - application/json
      description: Creates a new venue record in the kmaster venue list
      parameters:
      - description: Venue data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.KmasterVenueListInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.KmasterVenueListResponse'
        "400":
          description: Invalid input
          schema:
            type: object
        "500":
          description: Internal server error
          schema:
            type: object
      security:
      - CookieAuth: []
      summary: Create kmaster venue
      tags:
      - KmasterVenue
  /kmaster-venues/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a venue record from the kmaster venue list
      parameters:
      - description: Venue ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid ID
          schema:
            type: object
        "404":
          description: Venue not found
          schema:
            type: object
        "500":
          description: Internal server error
          schema:
            type: object
      security:
      - CookieAuth: []
      summary: Delete kmaster venue
      tags:
      - KmasterVenue
    get:
      consumes:
      - application/json
      description: Returns a single venue record from the kmaster venue list
      parameters:
      - description: Venue ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.KmasterVenueListResponse'
        "400":
          description: Invalid ID
          schema:
            type: object
        "404":
          description: Venue not found
          schema:
            type: object
        "500":
          description: Internal server error
          schema:
            type: object
      security:
      - CookieAuth: []
      summary: Get kmaster venue by ID
      tags:
      - KmasterVenue
    put:
      consumes:
      - application/json
      description: Updates an existing venue record in the kmaster venue list
      parameters:
      - description: Venue ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated venue data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.KmasterVenueListInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.KmasterVenueListResponse'
        "400":
          description: Invalid input
          schema:
            type: object
        "404":
          description: Venue not found
          schema:
            type: object
        "500":
          description: Internal server error
          schema:
            type: object
      security:
      - CookieAuth: []
      summary: Update kmaster venue
      tags:
      - KmasterVenue
  /locations/{id}:
    get:
      consumes:
      - application/json
      description: Returns a LiveBarn location with its associated surfaces
      parameters:
      - description: Location ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.LocationWithSurfaces'
        "400":
          description: Invalid ID
          schema:
            type: object
        "404":
          description: Location not found
          schema:
            type: object
        "500":
          description: Internal server error
          schema:
            type: object
      security:
      - CookieAuth: []
      summary: Get LiveBarn location by ID
      tags:
      - Locations
  /mhr-lb-notes:
    post:
      consumes:
      - application/json
      description: Updates the lb_notes field for a specific MHR location
      parameters:
      - description: MHR ID and LiveBarn notes
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/main.SetMhrLbNotesInput'
      produces:
      - application/json
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties: true
            type: object
      security:
      - CookieAuth: []
      summary: Update LiveBarn notes for MHR location
      tags:
      - Mappings
  /mhr-lb-notes/{mhr_id}:
    get:
      consumes:
      - application/json
      description: Retrieves the lb_notes field for a specific MHR location
      parameters:
      - description: MHR location ID
        in: path
        name: mhr_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: LiveBarn notes
          schema:
            $ref: '#/definitions/main.GetMhrLbNotesResponse'
        "404":
          description: MHR location not found
          schema:
            additionalProperties: true
            type: object
      security:
      - CookieAuth: []
      summary: Get LiveBarn notes for MHR location
      tags:
      - Mappings
  /mhr-locations:
    get:
      consumes:
      - application/json
      description: Returns paginated MHR location mappings with optional filters.
        Include export query parameter to download CSV.
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: string
      - description: 'Items per page (default: 10, max: 100)'
        in: query
        name: perPage
        type: string
      - description: Filter by rink name (partial match)
        in: query
        name: name
        type: string
      - description: Filter by province (partial match)
        in: query
        name: province
        type: string
      - description: Filter by LiveBarn location mapping status (0 for unmapped, 1
          for mapped)
        in: query
        name: livebarn_location_id
        type: string
      - description: Sort column (mhr_id, created_at)
        in: query
        name: sort
        type: string
      - description: Sort direction (asc, desc)
        in: query
        name: order
        type: string
      - description: Export as CSV when present (any non-empty value)
        in: query
        name: export
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MHRLocResult'
      security:
      - CookieAuth: []
      summary: Get paginated MHR location mappings
      tags:
      - Mappings
  /mhr-locations/{mhr_id}:
    get:
      consumes:
      - application/json
      description: Returns a single MHR location with its LiveBarn location and surface
        associations
      parameters:
      - description: MHR location ID
        in: path
        name: mhr_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MhrLocation'
        "400":
          description: Invalid MHR ID format
          schema:
            type: object
        "404":
          description: MHR location not found
          schema:
            type: object
        "500":
          description: Internal server error
          schema:
            type: object
      security:
      - CookieAuth: []
      summary: Get MHR location by ID
      tags:
      - Mappings
  /scrape:
    post:
      consumes:
      - application/json
      description: Starts scraping for specified site or all enabled sites. Sites
        already being scraped are skipped. Returns 409 only if ALL requested sites
        are already running.
      parameters:
      - description: Scraping request parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.ScrapeRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted, returns job status with sites_started and optionally
            sites_skipped
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: All requested sites are already being scraped
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - CookieAuth: []
      summary: Trigger scraping for site(s)
      tags:
      - Scraping
  /scrape/status:
    get:
      consumes:
      - application/json
      description: Returns current scraping status for all configured sites
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.ScrapeStatus'
            type: array
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - CookieAuth: []
      summary: Get scraping status for all sites
      tags:
      - Scraping
  /scrape/status/{site}:
    get:
      consumes:
      - application/json
      description: Returns current scraping status for the specified site
      parameters:
      - description: Site name
        in: path
        name: site
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.ScrapeStatus'
        "404":
          description: Site not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - CookieAuth: []
      summary: Get scraping status for a site
      tags:
      - Scraping
  /site-locations:
    get:
      consumes:
      - application/json
      description: Returns paginated site location mappings for a given site with
        optional pagination parameters
      parameters:
      - description: Site name
        in: query
        name: site
        type: string
      - description: Filter locations starting with this value
        in: query
        name: location
        type: string
      - description: Filter by tag name (exact match)
        in: query
        name: tag
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: string
      - description: 'Items per page (default: 10, max: 100)'
        in: query
        name: perPage
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SiteLocResult'
      security:
      - CookieAuth: []
      summary: Get paginated site location mappings
      tags:
      - Mappings
  /site-locations/{site}/{location}/tags:
    get:
      consumes:
      - application/json
      description: Returns all tags assigned to a specific site-location pair
      parameters:
      - description: Site name
        in: path
        name: site
        required: true
        type: string
      - description: Location name
        in: path
        name: location
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Tag'
            type: array
      security:
      - CookieAuth: []
      summary: Get tags for a site location
      tags:
      - Tags
    post:
      consumes:
      - application/json
      description: Associates tags (by ID) with a specific site-location pair
      parameters:
      - description: Site name
        in: path
        name: site
        required: true
        type: string
      - description: Location name
        in: path
        name: location
        required: true
        type: string
      - description: Tag IDs to add
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.AddTagsToSiteLocationInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            items:
              $ref: '#/definitions/model.Tag'
            type: array
      security:
      - CookieAuth: []
      summary: Add tags to a site location
      tags:
      - Tags
  /site-locations/{site}/{location}/tags/{tag_id}:
    delete:
      consumes:
      - application/json
      description: Removes an association between a tag and a site-location
      parameters:
      - description: Site name
        in: path
        name: site
        required: true
        type: string
      - description: Location name
        in: path
        name: location
        required: true
        type: string
      - description: Tag ID
        in: path
        name: tag_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      security:
      - CookieAuth: []
      summary: Remove a tag from a site location
      tags:
      - Tags
  /sites-config:
    get:
      consumes:
      - application/json
      description: Returns all site configurations with optional enabled filter, text
        search, and sorting
      parameters:
      - description: Filter by enabled status (true/false)
        in: query
        name: enabled
        type: string
      - description: Search by site name or display name (partial match)
        in: query
        name: search
        type: string
      - description: Sort column (site_name, display_name, last_scraped_at, games_scraped,
          games_imported, readiness_status)
        in: query
        name: sort
        type: string
      - description: Sort direction (asc, desc)
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.SitesConfigResponse'
            type: array
        "500":
          description: Internal server error
          schema:
            type: object
      summary: List sites configurations
      tags:
      - SitesConfig
  /sites-config/{id}/readiness:
    put:
      consumes:
      - application/json
      description: Updates the readiness status (0=pending, 1=in progress, 2=ready)
        for a site configuration
      parameters:
      - description: Site Config ID
        in: path
        name: id
        required: true
        type: string
      - description: Readiness status
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SitesConfigResponse'
        "400":
          description: Invalid readiness status
          schema:
            type: object
        "404":
          description: Site config not found
          schema:
            type: object
        "500":
          description: Internal server error
          schema:
            type: object
      security:
      - CookieAuth: []
      summary: Update site readiness status
      tags:
      - SitesConfig
  /sites-config/{id}/toggle:
    post:
      consumes:
      - application/json
      description: Toggles the enabled status of a site configuration. If enabled
        is NULL, sets to true.
      parameters:
      - description: Site Config ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SitesConfigResponse'
        "404":
          description: Site config not found
          schema:
            type: object
        "500":
          description: Internal server error
          schema:
            type: object
      summary: Toggle site configuration enabled status
      tags:
      - SitesConfig
  /tags:
    get:
      consumes:
      - application/json
      description: Returns all tags, optionally filtered by name search
      parameters:
      - description: Search tags by name (partial match)
        in: query
        name: q
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Tag'
            type: array
      security:
      - CookieAuth: []
      summary: List all tags
      tags:
      - Tags
    post:
      consumes:
      - application/json
      description: Creates a new tag with the given name, optional color and description
      parameters:
      - description: Tag details
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.CreateTagInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Tag'
      security:
      - CookieAuth: []
      summary: Create a tag
      tags:
      - Tags
  /tags/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a tag and removes all its associations (via CASCADE)
      parameters:
      - description: Tag ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      security:
      - CookieAuth: []
      summary: Delete a tag
      tags:
      - Tags
    put:
      consumes:
      - application/json
      description: Updates the name, color, or description of an existing tag
      parameters:
      - description: Tag ID
        in: path
        name: id
        required: true
        type: integer
      - description: Tag fields to update
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.UpdateTagInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Tag'
      security:
      - CookieAuth: []
      summary: Update a tag
      tags:
      - Tags
schemes:
- http
- https
securityDefinitions:
  CookieAuth:
    in: cookie
    name: gosession
    type: apiKey
swagger: "2.0"
